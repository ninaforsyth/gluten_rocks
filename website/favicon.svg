<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bun" cx="42%" cy="38%" r="58%">
      <stop offset="0%"  stop-color="#FCD34D"/>
      <stop offset="70%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </radialGradient>
  </defs>
  <!-- Bun shadow -->
  <ellipse cx="16" cy="17" rx="13" ry="12.5" fill="#92400E" opacity="0.25"/>
  <!-- Bun body -->
  <ellipse cx="16" cy="15.5" rx="13" ry="12" fill="url(#bun)"/>
  <!-- Crust edge -->
  <ellipse cx="16" cy="15.5" rx="13" ry="12" fill="none" stroke="#B45309" stroke-width="1.5"/>
  <!-- Score lines (the slashes on a bread top) -->
  <g stroke="#C97D10" stroke-width="1.2" stroke-linecap="round" opacity="0.7">
    <line x1="10" y1="12" x2="18" y2="20"/>
    <line x1="14" y1="10" x2="22" y2="18"/>
  </g>
  <!-- Highlight -->
  <ellipse cx="12" cy="10" rx="4" ry="2.5" fill="white" opacity="0.18" transform="rotate(-20 12 10)"/>
</svg>
