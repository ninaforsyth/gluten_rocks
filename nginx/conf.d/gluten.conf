# ============================================================
# gluten.rocks — NGINX site configuration
# SSL will be added later (certbot / Let's Encrypt).
# ============================================================

server {
    listen       80;
    listen  [::]:80;
    server_name  gluten.rocks www.gluten.rocks localhost;

    root  /usr/share/nginx/html;
    index index.html;

    # ---- Security headers ----
    add_header X-Frame-Options            "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options     "nosniff"                       always;
    add_header X-XSS-Protection          "1; mode=block"                  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=()" always;

    # Content Security Policy
    # No inline scripts or styles needed — zero JavaScript, external CSS only via Google Fonts.
    add_header Content-Security-Policy
        "default-src 'self'; \
         style-src 'self' https://fonts.googleapis.com; \
         font-src 'self' https://fonts.gstatic.com; \
         img-src 'self' data:; \
         script-src 'none'; \
         object-src 'none'; \
         base-uri 'self'; \
         form-action 'self'; \
         frame-ancestors 'none';" always;

    # ---- Static asset caching ----
    location ~* \.(css|js|woff2?|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";

        # Re-apply security headers for assets (nginx drops add_header on sub-locations)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options        "SAMEORIGIN" always;
    }

    # ---- HTML — no caching (so deploys are instant) ----
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";

        # Security headers repeated for this location block
        add_header X-Frame-Options            "SAMEORIGIN"                    always;
        add_header X-Content-Type-Options     "nosniff"                       always;
        add_header X-XSS-Protection          "1; mode=block"                  always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; \
             style-src 'self' https://fonts.googleapis.com; \
             font-src 'self' https://fonts.gstatic.com; \
             img-src 'self' data:; \
             script-src 'none'; \
             object-src 'none'; \
             base-uri 'self'; \
             form-action 'self'; \
             frame-ancestors 'none';" always;
    }

    # ---- SPA fallback (serves index.html for any unmatched path) ----
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # ---- Block common probing paths ----
    location ~ /\.(git|env|htaccess|htpasswd|svn|DS_Store) {
        deny all;
        return 404;
    }

    location ~* (\.php|wp-login|xmlrpc|\.asp|\.aspx|\.cgi)$ {
        deny all;
        return 404;
    }

    # ---- Error pages ----
    error_page  404              /index.html;
    error_page  500 502 503 504  /index.html;

    # ---- Disable access log for favicons/robots ----
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ---- robots.txt (inline, no file needed) ----
    location = /robots.txt {
        return 200 "User-agent: *\nAllow: /\nSitemap: https://gluten.rocks/sitemap.xml\n";
        add_header Content-Type text/plain;
    }

    # ---- sitemap.xml — no caching so updates are immediate ----
    location = /sitemap.xml {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type  "application/xml";
        access_log off;
    }

    # ---- Client request limits ----
    client_max_body_size     1m;
    client_body_timeout      12s;
    client_header_timeout    12s;
    send_timeout             10s;

    # ---- Rate limiting ----
    # Defined in http block; referenced here.
    # limit_req zone=general burst=20 nodelay;
}

